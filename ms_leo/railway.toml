# Service → Source / Root = `ms_leo` (обязательно), Docker = `Dockerfile` (этот каталог).
# В самом Dockerfile — COPY go.mod (без префикса ms_leo/): контекст сборки = только папка ms_leo.
# Сборка из КОРНЯ всего репо: в настройках укажи путь к файлу `Dockerfile.bot` (в корне репо, COPY ms_leo/...). Не подставляй этот путь, если Root = `ms_leo` — иначе COPY ms_leo/ not found.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
