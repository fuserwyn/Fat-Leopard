# Nixpacks в ms_leo — через Docker, как в docker compose.
# В Railway: Source / Root Directory = `ms_leo` (не весь репо). Dockerfile = `Dockerfile` (этот каталог).
# Не указывай в UI путь `Dockerfile.bot` из корня — он для другого контекста сборки (там есть папка `ms_leo/` внутри build context).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
