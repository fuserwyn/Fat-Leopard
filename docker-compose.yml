version: '3.8'

services:
  bot:
    build: .
    environment:
      - FAT_LEOPARD_API_TOKEN=${FAT_LEOPARD_API_TOKEN}
      - API_TOKEN=${API_TOKEN}
      - MONETIZED_CHAT_INVITE_URL=${MONETIZED_CHAT_INVITE_URL}
      - OWNER_ID=${OWNER_ID}
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@postgres:5432/leo_bot_db?sslmode=disable}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LOG_LEVEL=info
      - PAYWALL_ENABLED=${PAYWALL_ENABLED:-false}
      - MONETIZED_CHAT_ID=${MONETIZED_CHAT_ID:-}
      - PAYMENT_PROVIDER_TOKEN=${PAYMENT_PROVIDER_TOKEN:-}
      - PAYMENT_CURRENCY=${PAYMENT_CURRENCY:-RUB}
      - PAYMENT_AMOUNT_MINOR_UNITS=${PAYMENT_AMOUNT_MINOR_UNITS:-10000}
      - PAYMENT_INVOICE_TITLE=${PAYMENT_INVOICE_TITLE:-Доступ в группу}
      - PAYMENT_INVOICE_DESCRIPTION=${PAYMENT_INVOICE_DESCRIPTION:-Разовый доступ после оплаты заявка будет одобрена автоматически.}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID:-}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY:-}
      - YOOKASSA_RETURN_URL=${YOOKASSA_RETURN_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8080:8080"

  # Вебхук YooKassa → завершение paywall в той же БД, что и Go-бот.
  payment-webhook:
    build: ./fastapi
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:password@postgres:5432/leo_bot_db?sslmode=disable}
      - PAYMENT_DATABASE_URL=${PAYMENT_DATABASE_URL:-postgresql://postgres:password@postgres:5432/leo_payments?sslmode=disable}
      - FAT_LEOPARD_API_TOKEN=${FAT_LEOPARD_API_TOKEN}
      - API_TOKEN=${API_TOKEN}
      - MONETIZED_CHAT_ID=${MONETIZED_CHAT_ID}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID:-}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8081:8000"

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=leo_bot_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leo_bot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
